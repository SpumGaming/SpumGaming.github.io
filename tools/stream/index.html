<!DOCTYPE html>
<html>
    <head>
        <script src="js/app.js" type="module"></script>
        <title>SpumTools | Stream</title>       
        <!-- stylesheets -->
            <!-- vendor-->
            <link href="vendor/bootstrap-5.1.3/css/bootstrap.min.css" rel="stylesheet"/>
            <link href="vendor/aos/css/aos.css" rel="stylesheet"/>
            <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css" rel="stylesheet"/>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.13.1/css/bootstrap-select.min.css"> -->
            <!-- flags -->
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"/>
            <!-- icons -->
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

        <!-- fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">        

        <!-- scripts -->
            <!-- vendor -->
            <script src="vendor/bootstrap-5.1.3/js/bootstrap.min.js"></script>
            <script src="vendor/jquery-3.6.0/jquery-3.6.0.slim.min.js"></script>
            <script src="vendor/aos/js/aos.js"></script>
            <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script> 
            <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>
            <script src="vendor/bootstrap-select/main.js"></script> -->
            <!-- <script src="vendor/popper/popper.js"></script> -->
            
    </head>
    <body>
        <main>
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="mb-3"></div>
                    <div class="col-6">
                        <form class="border border-secondary rounded p-2 mb-3" id="formPvp" data-destination="pvp">
                            <legend>Player versus Player</legend>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectPlayer" class="form-label">Player 1</label>
                                    <select id="selectPlayer" class="selectpicker form-select" option-source="players"><!-- populated by JS --></select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectPlayer" class="form-label">Player 2</label>
                                    <select id="selectPlayer" class="form-select" option-source="players"><!-- populated by JS --></select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectStats" class="form-label">Stats</label>
                                    <select id="selectStats" class="form-select" multiple>
                                        <!-- populated by JS -->
                                        <option value="mp">maps played</option>
                                        <option value="k">kills</option>
                                        <option value="d">deaths</option>
                                        <option value="d">1</option>
                                        <option value="d">2</option>
                                        <option value="d">3</option>
                                        <option value="d">4</option>
                                        <option value="d">5</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Open</button>
                        </form>
                        <form class="border border-secondary rounded p-2 mb-3" id="formTeam" data-destination="team">
                            <legend>Team Lineup</legend>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectTeam" class="form-label">Player 2</label>
                                    <select id="selectTeam" class="form-select" option-source="teams"><!-- populated by JS --></select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Open</button>
                        </form>
                        <form class="border border-secondary rounded p-2 mb-3" id="formVeto" data-destination="veto">
                            <legend>Veto</legend>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectFormat" class="form-label">Format</label>
                                    <select id="selectFormat" class="form-select" option-source="formats"><!-- populated by JS --></select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="selectTeam" class="form-label">Team</label>
                                    <select id="selectTeam" class="form-select" option-source="teams"><!-- populated by JS --></select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Open</button>
                        </form>
                        <i class="fa-solid fa-rocket"></i>
                        <i class="fa-solid fa-wheelchair"></i>
                        <i class="fa-solid fa-basketball"></i>
                        <i class="fa-solid fa-ice-cream"></i>
                        <i class="fa-solid fa-star-and-crescent"></i>
                    </div>
                </div>
            </div>
        </main>
        <script>
            window.addEventListener("load", () => window.SetupIndexPage());
        </script>
    </body>
</html>
